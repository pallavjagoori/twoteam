name: Governance

on:
  pull_request:
    paths:
      - ".github/**"
      - "docs/**"
      - "scripts/validate-governance.sh"
      - "README.md"
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "docs/**"
      - "scripts/validate-governance.sh"
      - "README.md"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Validate governance files
        run: bash scripts/validate-governance.sh
