name: Governance

on:
  pull_request:
    paths:
      - ".github/**"
      - "docs/**"
      - "scripts/validate-governance.sh"
      - "scripts/validate-upstream.sh"
      - "upstream/**"
      - "README.md"
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "docs/**"
      - "scripts/validate-governance.sh"
      - "scripts/validate-upstream.sh"
      - "upstream/**"
      - "README.md"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Validate governance files
        run: bash scripts/validate-governance.sh
      - name: Validate upstream snapshot
        if: ${{ hashFiles('upstream/CHATWOOT_VERSION') != '' }}
        run: bash scripts/validate-upstream.sh
