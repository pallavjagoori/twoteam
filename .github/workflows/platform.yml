name: Platform

on:
  pull_request:
    paths:
      - ".github/workflows/platform.yml"
      - "apps/api/**"
      - "apps/web/**"
      - "infrastructure/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/platform.yml"
      - "apps/api/**"
      - "apps/web/**"
      - "infrastructure/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: php artisan test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable
      - run: corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm web:test
      - run: pnpm web:build

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f infrastructure/compose.yml config --quiet
