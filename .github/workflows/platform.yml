name: Platform

on:
  pull_request:
    paths:
      - ".github/workflows/platform.yml"
      - "apps/api/**"
      - "apps/web/**"
      - "infrastructure/**"
      - "contracts/**"
      - "tests/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/platform.yml"
      - "apps/api/**"
      - "apps/web/**"
      - "infrastructure/**"
      - "contracts/**"
      - "tests/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node --test tests/contracts/*.test.mjs
      - run: node scripts/side-effect-contracts.mjs contracts/side-effects/*.json

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: pcov
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/pint --test
      - run: php artisan test --coverage --min=100

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack install
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm web:test
      - run: pnpm web:build
      - run: pnpm web:chatwoot

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f infrastructure/compose.yml config --quiet
      - run: docker compose -f infrastructure/reference/compose.yml config --quiet

  hardening:
    runs-on: ubuntu-latest
    env:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://support.example.test
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      SESSION_SECURE_COOKIE: "true"
      LOG_LEVEL: info
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5433
      DB_DATABASE: twoteam
      DB_USERNAME: twoteam
      DB_PASSWORD: twoteam
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6380
      REDIS_PASSWORD: ""
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: composer install --no-interaction --prefer-dist
        working-directory: apps/api
      - name: Validate production security configuration
        run: node scripts/validate-production-env.mjs
        env:
          DB_PASSWORD: strong-database-secret
          REDIS_PASSWORD: strong-redis-secret
      - name: Start dependencies
        run: docker compose -f infrastructure/compose.yml up -d --wait postgres redis
      - name: Build production caches and database
        run: |
          php artisan config:cache
          php artisan migrate --force
        working-directory: apps/api
      - name: Rehearse database backup and restore
        run: bash scripts/recovery-drill.sh
      - name: Run API load smoke
        run: |
          php apps/api/artisan serve --host=127.0.0.1 --port=8000 > /tmp/twoteam-api.log 2>&1 &
          api_pid=$!
          trap 'kill "$api_pid"' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/api/health >/dev/null; then
              break
            fi
            sleep 1
          done
          node scripts/load-smoke.mjs http://127.0.0.1:8000/api/health 200 20 750
      - name: Stop dependencies
        if: always()
        run: docker compose -f infrastructure/compose.yml down --volumes

  cutover:
    runs-on: ubuntu-latest
    needs: [api, web, hardening]
    env:
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_URL: https://support.example.test
      POSTGRES_PASSWORD: cutover-database-secret
      REDIS_PASSWORD: cutover-redis-secret
      AWS_ACCESS_KEY_ID: cutover-access-key
      AWS_SECRET_ACCESS_KEY: cutover-storage-secret
      AWS_BUCKET: twoteam-cutover
      TWOTEAM_API_IMAGE: twoteam-api:current
      TWOTEAM_WEB_IMAGE: twoteam-web:current
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: composer install --no-interaction --prefer-dist
        working-directory: apps/api
      - name: Verify Laravel-only route, service and rollback contracts
        run: node scripts/verify-laravel-cutover.mjs
      - name: Build immutable Laravel and Vue images
        run: |
          docker build --target api-runtime --tag twoteam-api:current --tag twoteam-api:previous .
          docker build --target web-runtime --tag twoteam-web:current --tag twoteam-web:previous .
      - name: Start Laravel-only production stack
        run: docker compose -f infrastructure/compose.production.yml up -d --wait
      - name: Prove frontend and API cutover
        run: |
          node scripts/smoke-laravel-cutover.mjs http://127.0.0.1:8080
          docker compose -f infrastructure/compose.production.yml exec -T api sh -c '! command -v ruby && ! command -v rails && test ! -e /var/www/html/Gemfile'
      - name: Render the unmodified login frontend in Chrome
        run: |
          google-chrome --headless=new --no-sandbox --disable-gpu \
            --virtual-time-budget=10000 --window-size=1440,1000 \
            --dump-dom --screenshot=/tmp/twoteam-login.png \
            http://127.0.0.1:8080/app/login > /tmp/twoteam-login.html
          grep -Fq 'data-testid="email_input"' /tmp/twoteam-login.html
          grep -Fq 'data-testid="password_input"' /tmp/twoteam-login.html
          grep -Fq 'data-testid="submit_button"' /tmp/twoteam-login.html
      - uses: actions/upload-artifact@v4
        with:
          name: laravel-cutover-browser-evidence
          path: /tmp/twoteam-login.png
          if-no-files-found: error
      - name: Rehearse immutable-image rollback
        env:
          TWOTEAM_API_IMAGE: twoteam-api:previous
          TWOTEAM_WEB_IMAGE: twoteam-web:previous
        run: |
          docker compose -f infrastructure/compose.production.yml up -d --wait
          node scripts/smoke-laravel-cutover.mjs http://127.0.0.1:8080
      - name: Stop production stack
        if: always()
        run: docker compose -f infrastructure/compose.production.yml down --volumes
