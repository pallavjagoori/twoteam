name: twoteam

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: twoteam
      POSTGRES_USER: twoteam
      POSTGRES_PASSWORD: twoteam
    ports:
      - "${TWOTEAM_POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twoteam -d twoteam"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${TWOTEAM_REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
