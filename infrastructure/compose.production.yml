name: twoteam-production

x-api-image: &api-image ${TWOTEAM_API_IMAGE:-twoteam-api:current}
x-api-environment: &api-environment
  APP_NAME: Twoteam
  APP_ENV: production
  APP_KEY: ${APP_KEY:?APP_KEY is required}
  APP_DEBUG: "false"
  APP_URL: ${APP_URL:?APP_URL is required}
  LOG_CHANNEL: stderr
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: twoteam
  DB_USERNAME: twoteam
  DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  REDIS_CLIENT: predis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  SESSION_SECURE_COOKIE: "true"
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-s3}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
  AWS_BUCKET: ${AWS_BUCKET:?AWS_BUCKET is required}
  AWS_ENDPOINT: ${AWS_ENDPOINT:-}
  AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
  API_RATE_LIMIT_PER_MINUTE: ${API_RATE_LIMIT_PER_MINUTE:-300}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: twoteam
      POSTGRES_USER: twoteam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twoteam -d twoteam"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - redis-data:/data

  migrate:
    image: *api-image
    environment: *api-environment
    command: ["php", "artisan", "migrate", "--force"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    image: *api-image
    restart: unless-stopped
    environment: *api-environment
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    image: *api-image
    restart: unless-stopped
    environment: *api-environment
    command: ["php", "artisan", "queue:work", "redis", "--sleep=1", "--tries=3", "--timeout=90"]
    stop_grace_period: 2m
    depends_on:
      migrate:
        condition: service_completed_successfully

  scheduler:
    image: *api-image
    restart: unless-stopped
    environment: *api-environment
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    image: ${TWOTEAM_WEB_IMAGE:-twoteam-web:current}
    restart: unless-stopped
    ports:
      - "${TWOTEAM_HTTP_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
